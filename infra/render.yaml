services:
  - type: web
    name: soso-dna-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      - key: SOSOVALUE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: soso-dna-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false
      - key: VITE_CHAIN_ID
        value: "138565"
      - key: VITE_VALUECHAIN_RPC_URL
        value: https://testnet-rpc.valuechain.xyz
      - key: VITE_DEMO_MODE
        value: "false"
